name: Weekly SERP scrape

on:
  schedule:
    - cron: "0 14 * * 1"   # Mondays 14:00 UTC ≈ 04:00 Hawaii (HST = UTC-10)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run scraper
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: |
          python -m ksh_serp.scraper

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/serp.db
          git diff --staged --quiet || git commit -m "data: weekly scrape $(date -u +%Y-%m-%d)"
          git push
